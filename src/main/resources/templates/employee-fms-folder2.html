<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <title>FMS Folder 2 - Employee Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --panel: #ffffff;
            --ink: #0f172a;
            --muted: #64748b;
            --line: #e2e8f0;
            --primary: #3b82f6;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif;
            color: var(--ink);
            background: var(--bg);
            min-height: 100vh;
        }

        /* HEADER AREA */
        .page-header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            border-radius: 12px;
            padding: 20px 24px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            color: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            margin-bottom: 24px;
            margin-top: 16px;
        }

        .page-header h1 {
            text-align: center;
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 0.5px;
            color: #f97316;
            text-transform: uppercase;
            margin: 0;
            line-height: 1.1;
        }

        .header-date {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #cbd5e1;
            justify-self: end;
        }

        .mobile-menu-btn {
            display: none;
            width: 40px;
            height: 40px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .emp-main-content {
            padding: 0 24px;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 20px;
        }

        .panel {
            background: var(--panel);
            border-radius: var(--radius);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            padding: 24px;
        }

        .coming-soon {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .coming-soon svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            color: var(--primary);
        }

        .coming-soon h3 {
            margin: 0 0 8px;
            font-size: 20px;
            color: var(--ink);
        }

        @media (max-width: 1024px) {
            .mobile-menu-btn {
                display: flex;
            }
        }
    </style>
</head>

<body>
    <th:block th:replace="~{fragments/employee-sidebar :: sidebar}"></th:block>
    <main class="emp-main-content">
        <!-- HEADER -->
        <div class="page-header">
            <div>
                <button class="mobile-menu-btn" onclick="toggleMobileSidebar()" type="button"
                    aria-label="Toggle sidebar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                        <line x1="3" y1="12" x2="21" y2="12" />
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg>
                </button>
            </div>
            <h1 th:text="${(employeeName != null ? #strings.toUpperCase(employeeName) + '''S ' : '') + 'FMS FOLDER 2'}">
                EMPLOYEE'S FMS FOLDER 2</h1>
            <div class="header-date">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <span>Select date range</span>
            </div>
        </div>

        <div class="content">
            <div class="breadcrumb">
                <a th:href="@{/employee/fms}">FMS</a>
                <span>›</span>
                <span>Folder 2</span>
            </div>
            <div class="panel">
                <div class="coming-soon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
                    </svg>
                    <h3>Folder 2 Content</h3>
                    <p>This folder contains FMS documents and workflows.</p>
                    <p>Implementation in progress...</p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
