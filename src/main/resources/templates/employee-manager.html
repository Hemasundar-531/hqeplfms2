<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Employee Manager</title>
    <style>
        .app-shell {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #132a63, #1f3c88);
            color: #fff;
            padding: 20px 16px;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .sidebar .brand {
            font-weight: 800;
            font-size: 16px;
            letter-spacing: 0.4px;
            margin-bottom: 18px;
        }

        .sidebar .brand span {
            display: block;
            font-weight: 400;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 4px;
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-link {
            color: #e9efff;
            text-decoration: none;
            font-size: 13px;
            padding: 10px 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.16);
        }

        .logout-form {
            margin-top: 18px;
        }

        .logout-btn {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: none;
            background: #f97316;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }

        .app-content {
            flex: 1;
            padding: 24px;
        }

        :root {
            --ink: #0f1b2d;
            --slate: #5a6b7c;
            --navy: #1f3c88;
            --navy-deep: #152d6c;
            --teal: #0aa6a6;
            --bg: #f2f6fb;
            --panel: #ffffff;
            --shadow: 0 16px 34px rgba(10, 23, 47, 0.12);
            --purple: #8b5cf6;
            --orange: #f97316;
            --pink: #ec4899;
            --gradient-primary: linear-gradient(135deg, var(--purple), var(--navy));
            --gradient-secondary: linear-gradient(135deg, var(--teal), var(--orange));
            --gradient-accent: linear-gradient(135deg, var(--pink), var(--purple));
        }

        body {
            font-family: "Poppins", "Segoe UI", Tahoma, sans-serif;
            background:
                radial-gradient(circle at 12% 18%, rgba(10, 166, 166, 0.12), transparent 45%),
                radial-gradient(circle at 90% 10%, rgba(31, 60, 136, 0.16), transparent 45%),
                var(--bg);
            margin: 0;
            color: var(--ink);
        }

        .header {
            position: relative;
            padding: 22px 0;
            background: linear-gradient(120deg, var(--navy), #2847a7 55%, #1b66b0);
            color: white;
            text-align: center;
            overflow: hidden;
        }

        .header::after {
            content: "";
            position: absolute;
            right: -80px;
            top: -90px;
            width: 220px;
            height: 220px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
        }

        h2 {
            text-align: center;
            margin: 0;
        }

        .add-btn {
            position: absolute;
            right: 20px;
            top: 18px;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: var(--gradient-secondary);
            color: white;
            font-size: 26px;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(249, 115, 22, 0.3);
            z-index: 2;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .add-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 24px rgba(249, 115, 22, 0.4);
        }

        table {
            width: 80%;
            margin: 18px auto 0;
            border-collapse: collapse;
            background: white;
            box-shadow: var(--shadow);
            border: 1px solid #dde3ec;
            border-radius: 12px;
            /* overflow: hidden; Removed to allow dropdowns to show */
            transition: box-shadow 0.3s ease;
        }

        table:hover {
            box-shadow: 0 20px 40px rgba(10, 23, 47, 0.15);
        }

        th,
        td {
            border: 1px solid #dde3ec;
            padding: 12px;
            text-align: center;
            transition: background-color 0.3s ease;
        }

        th {
            background: var(--gradient-primary);
            color: white;
            font-weight: 600;
        }

        tbody tr:nth-child(even) {
            background: #f8fafc;
        }

        tbody tr:hover {
            background: rgba(139, 92, 246, 0.1);
        }

        select {
            padding: 5px;
            border-radius: 6px;
            border: 1px solid #cfd6dd;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: white;
            width: 360px;
            max-height: 85vh;
            margin: 60px auto;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.25);
            animation: slideIn 0.3s ease;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Custom scrollbar for modal */
        .modal-content::-webkit-scrollbar {
            width: 6px;
        }

        .modal-content::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 3px;
        }

        .modal-content::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .modal-content::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #cfd6dd;
            border-radius: 6px;
        }

        .modal-content button {
            padding: 10px 18px;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .save {
            background: var(--gradient-secondary);
            color: white;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }

        .save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(249, 115, 22, 0.4);
        }

        .cancel {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            float: right;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .cancel:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(239, 68, 68, 0.4);
        }

        .icon {
            width: 16px;
            height: 16px;
            fill: currentColor;
            flex: 0 0 auto;
        }

        .icon-lg {
            width: 18px;
            height: 18px;
        }

        .breadcrumbs {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--slate);
            margin: 16px auto 0;
            width: 80%;
        }

        .breadcrumbs a {
            color: var(--navy-deep);
            text-decoration: none;
            font-weight: 600;
        }

        .breadcrumbs span {
            color: #9aa7b6;
        }

        /* Action dropdown in table rows */
        td.action-cell {
            position: relative;
            text-align: center;
            vertical-align: middle;
            white-space: nowrap;
        }

        .row-action-wrap {
            position: relative;
            display: inline-block;
        }

        .row-action-trigger {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border: 1px solid #cfd6dd;
            border-radius: 8px;
            background: var(--panel);
            color: var(--ink);
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .row-action-trigger:hover {
            border-color: var(--navy);
            background: rgba(31, 60, 136, 0.08);
            transform: scale(1.02);
        }

        .row-action-trigger::after {
            content: "\25BE";
            font-size: 10px;
            opacity: 0.8;
        }

        .row-action-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 4px;
            min-width: 180px;
            max-width: 260px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            box-shadow: var(--shadow);
            z-index: 120;
            padding: 6px 0;
            animation: fadeIn 0.2s ease;
            max-height: min(220px, 45vh);
            overflow-y: auto;
            overflow-x: hidden;
            overscroll-behavior: contain;
            scrollbar-gutter: stable;
            scrollbar-width: thin;
            scrollbar-color: #94a3b8 #f1f5f9;
        }

        .row-action-dropdown.open-upward {
            top: auto;
            bottom: 100%;
            margin-bottom: 4px;
        }

        .row-action-dropdown.show {
            display: block;
        }

        .row-action-item {
            width: 100%;
            padding: 10px 14px;
            border: none;
            background: none;
            text-align: left;
            font-size: 13px;
            color: var(--ink);
            cursor: pointer;
            font-family: inherit;
            transition: background-color 0.2s ease;
        }

        .row-action-item:hover {
            background: rgba(139, 92, 246, 0.08);
        }

        .row-action-item.danger {
            color: #dc2626;
        }

        .row-action-item.danger:hover {
            background: #fee2e2;
        }

        .row-action-dropdown::-webkit-scrollbar {
            width: 6px;
        }

        .row-action-dropdown::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 3px;
        }

        .row-action-dropdown::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .row-action-dropdown::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Permission column */
        td.permission-cell {
            position: relative;
            text-align: center;
            vertical-align: middle;
        }

        .perm-trigger {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border: 1px solid #cfd6dd;
            border-radius: 8px;
            background: var(--panel);
            color: var(--ink);
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .perm-trigger:hover {
            border-color: var(--purple);
            background: rgba(139, 92, 246, 0.1);
            transform: scale(1.02);
        }

        .perm-trigger::after {
            content: "▾";
            font-size: 10px;
            opacity: 0.8;
        }


        .perm-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 4px;
            min-width: 220px;
            max-width: 320px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            box-shadow: var(--shadow);
            z-index: 100;
            padding: 10px 0;
            animation: fadeIn 0.2s ease;
            max-height: min(340px, 55vh);
            overflow-y: auto;
            overflow-x: hidden;
            overscroll-behavior: contain;
            scrollbar-gutter: stable;
            scrollbar-width: thin;
            scrollbar-color: #94a3b8 #f1f5f9;
        }

        .perm-dropdown.open-upward {
            top: auto;
            bottom: 100%;
            margin-bottom: 4px;
        }

        .perm-section-title {
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .perm-dropdown.show {
            display: block;
        }

        .perm-dropdown .perm-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            font-size: 13px;
            color: var(--ink);
            cursor: default;
        }

        .perm-item:hover {
            background: rgba(139, 92, 246, 0.1);
        }

        .perm-dropdown .perm-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--navy);
        }

        /* FMS = nested dropdown (dropdown inside main Permission dropdown) */
        .perm-fms-row {
            position: relative;
        }

        .perm-fms-trigger {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 8px 14px;
            font-size: 13px;
            color: var(--ink);
            background: none;
            border: none;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            transition: background-color 0.3s ease;
        }

        .perm-fms-trigger:hover {
            background: rgba(139, 92, 246, 0.1);
        }

        .perm-fms-trigger::after {
            content: "▾";
            font-size: 10px;
            opacity: 0.8;
        }

        .perm-fms-dropdown {
            display: none;
            position: absolute;
            left: 100%;
            top: 0;
            margin-left: 2px;
            min-width: 180px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-shadow: var(--shadow);
            z-index: 101;
            padding: 6px 0;
            max-height: min(280px, 45vh);
            overflow-y: auto;
            overflow-x: hidden;
            overscroll-behavior: contain;
            scrollbar-gutter: stable;
            scrollbar-width: thin;
            scrollbar-color: #94a3b8 #f1f5f9;
        }

        .perm-fms-dropdown.show {
            display: block;
        }

        .perm-fms-dropdown .perm-item {
            padding: 6px 12px;
        }

        .perm-fms-dropdown .perm-item:hover {
            background: rgba(139, 92, 246, 0.1);
        }

        /* Custom scrollbar for permission dropdowns */
        .perm-dropdown::-webkit-scrollbar,
        .perm-fms-dropdown::-webkit-scrollbar {
            width: 6px;
        }

        .perm-dropdown::-webkit-scrollbar-track,
        .perm-fms-dropdown::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 3px;
        }

        .perm-dropdown::-webkit-scrollbar-thumb,
        .perm-fms-dropdown::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .perm-dropdown::-webkit-scrollbar-thumb:hover,
        .perm-fms-dropdown::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Responsive tweaks */
        @media (max-width: 768px) {
            .app-shell {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: static;
            }

            .app-content {
                padding: 16px;
            }

            .table-responsive {
                width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            table {
                width: 100%;
                min-width: 600px;
                /* Ensure table doesn't shrink too much */
            }

            .modal-content {
                width: 90%;
                margin: 60px auto;
            }

            .add-btn {
                right: 10px;
                top: 10px;
                width: 36px;
                height: 36px;
                font-size: 20px;
            }
        }

        /* Global Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .perm-accordion-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
        }

        .perm-accordion-btn:hover {
            background: #f1f5f9;
            color: #1e293b;
        }

        .perm-accordion-btn svg {
            transition: transform 0.2s;
        }

        .perm-accordion-btn.open {
            background: #eff6ff;
            color: #2563eb;
            border-color: #bfdbfe;
        }

        .perm-accordion-btn.open svg {
            transform: rotate(180deg);
        }

        .perm-accordion-content {
            display: none;
            padding: 8px;
            border: 1px solid #e2e8f0;
            border-top: none;
            border-radius: 0 0 6px 6px;
            margin-top: -2px;
            background: #fff;
        }

        .perm-accordion-content.open {
            display: block;
            animation: slideDown 0.2s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    <script>
        function toggleAccordion(btn) {
            btn.classList.toggle('open');
            const content = btn.nextElementSibling;
            content.classList.toggle('open');
        }
    </script>
</head>

<body>
    <th:block th:replace="~{fragments/admin-navbar :: navbar}"></th:block>

    <div class="app-shell">

        <main class="app-content">

            <div class="header">
                <h2>Employee Manager</h2>
                <button class="add-btn" onclick="openModal()" aria-label="Add employee">
                    <svg class="icon icon-lg" viewBox="0 0 24 24" aria-hidden="true">
                        <path
                            d="M12 5a1 1 0 0 1 1 1v5h5a1 1 0 1 1 0 2h-5v5a1 1 0 1 1-2 0v-5H6a1 1 0 1 1 0-2h5V6a1 1 0 0 1 1-1z" />
                    </svg>
                </button>
            </div>

            <div class="breadcrumbs">
                <a href="/admin/dashboard">Home</a>
                <span>›</span>
                <span>Employees</span>
            </div>

            <div id="employeeSuccessMessage" role="alert"
                style="display:none; margin-bottom:16px; padding:12px 16px; border-radius:10px; background:linear-gradient(135deg, #e6f6ee, #d1f2d3); color:#1e8e5a; font-size:14px; border:1px solid #c8ecd8; animation: fadeIn 0.5s ease;">
                Employee added successfully. Login credentials created: username = employee name, default password =
                1234567.
            </div>
            <div id="employeeErrorMessage" role="alert"
                style="display:none; margin-bottom:16px; padding:12px 16px; border-radius:10px; background:linear-gradient(135deg, #fde7e7, #f8d7da); color:#c0362c; font-size:14px; border:1px solid #f0c0c0; animation: fadeIn 0.5s ease;">
            </div>

            <div class="table-responsive">
                <table id="employeeTable">
                    <thead>
                        <tr>
                            <th>S.No</th>
                            <th>Employee Name</th>
                            <th>Email</th>
                            <th>Password</th>
                            <th>Department</th>
                            <th>Status</th>
                            <th>Permission</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="employeeTableBody">
                    </tbody>
                </table>
            </div>

            <div class="modal" id="employeeModal">
                <div class="modal-content">
                    <h3 id="modalTitle">Add Employee</h3>
                    <input type="hidden" id="empId" />
                    <input type="text" id="empName" placeholder="Employee Name">
                    <input type="email" id="empEmail" placeholder="Email Address">
                    <input type="text" id="empDept" placeholder="Department">
                    <input type="password" id="empPassword" placeholder="Password">
                    <!-- Status removed, defaults to Active -->

                    <!-- Permissions section removed as per request -->
                    <div style="display:none;">
                        <input type="checkbox" id="permOrderEntry">
                        <div id="fmsFoldersCheckboxes"></div>
                    </div>

                    <button class="save" onclick="saveEmployee()">
                        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                            <path
                                d="M9 19a1 1 0 0 1-.7-.3l-4-4a1 1 0 1 1 1.4-1.4l3.3 3.3 8.3-8.3a1 1 0 1 1 1.4 1.4l-9 9a1 1 0 0 1-.7.3Z" />
                        </svg>
                        Save
                    </button>
                    <button class="cancel" onclick="closeModal()">
                        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
                            <path
                                d="M6 6a1 1 0 0 1 1.4 0L12 10.6 16.6 6A1 1 0 1 1 18 7.4L13.4 12 18 16.6A1 1 0 0 1 16.6 18L12 13.4 7.4 18A1 1 0 0 1 6 16.6L10.6 12 6 7.4A1 1 0 0 1 6 6Z" />
                        </svg>
                        Cancel
                    </button>
                </div>
            </div>

            <script>
                const API_BASE = '/admin/api/employees';
                let allFmsFolders = [];
                let employees = [];

                function openModal() {
                    document.getElementById("modalTitle").textContent = "Add Employee";
                    document.getElementById("empId").value = "";
                    document.getElementById("empName").value = "";
                    document.getElementById("empEmail").value = "";
                    document.getElementById("empDept").value = "";
                    document.getElementById("empPassword").value = "";

                    // Clear permissions
                    document.getElementById("permOrderEntry").checked = false;
                    const checkboxes = document.querySelectorAll("#fmsFoldersCheckboxes input[type='checkbox']");
                    checkboxes.forEach(cb => cb.checked = false);

                    document.getElementById("employeeModal").style.display = "flex";
                }

                function closeModal() {
                    document.getElementById("employeeModal").style.display = "none";
                }

                // Old saveEmployee removed


                function showSuccessMessage() {
                    var el = document.getElementById("employeeSuccessMessage");
                    el.style.display = "block";
                    hideMessage("employeeErrorMessage");
                    setTimeout(function () { el.style.display = "none"; }, 6000);
                }

                function showErrorMessage(msg) {
                    var el = document.getElementById("employeeErrorMessage");
                    el.textContent = msg || "Failed to add employee. Please try again.";
                    el.style.display = "block";
                    document.getElementById("employeeSuccessMessage").style.display = "none";
                }

                function hideMessage(id) {
                    var el = document.getElementById(id);
                    if (el) { el.style.display = "none"; el.textContent = ""; }
                }

                async function loadEmployees() {
                    console.log('[DEBUG] loadEmployees called');
                    try {
                        const res = await fetch(API_BASE);
                        if (!res.ok) throw new Error('Failed to load employees');
                        const data = await res.json();
                        // API returns { employees: [], fmsFolders: [] }
                        employees = data.employees || [];
                        allFmsFolders = data.fmsFolders || [];

                        console.log('[DEBUG] Loaded', employees.length, 'employees and', allFmsFolders.length, 'FMS folders');

                        // Render FMS folder checkboxes in the modal
                        renderFmsFolderCheckboxes();

                        renderTable(employees);
                    } catch (e) {
                        console.error(e);
                        document.getElementById("employeeTableBody").innerHTML =
                            '<tr><td colspan="5" style="text-align:center;color:#94a3b8;">Unable to load employees. Refresh the page.</td></tr>';
                    }
                }

                function renderFmsFolderCheckboxes() {
                    const container = document.getElementById('fmsFoldersCheckboxes');
                    if (!container) return;

                    if (!allFmsFolders || allFmsFolders.length === 0) {
                        container.innerHTML = '<div style="font-size:12px; color:#94a3b8;">No FMS folders available</div>';
                        return;
                    }

                    container.innerHTML = allFmsFolders.map(folder => `
            <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:12px; color:#64748b;">
                <input type="checkbox" class="fms-folder-checkbox" data-folder-id="${folder.id}" style="cursor:pointer;">
                ${escapeHtml(folder.name)}
            </label>
        `).join('');
                }

                function renderTable(employees) {
                    const tbody = document.getElementById("employeeTableBody");
                    if (!employees || employees.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#94a3b8;">No employees yet. Add one using the + button.</td></tr>';
                        return;
                    }

                    // Compute taken Order Entry permissions once
                    const takenOrderEntry = {};
                    employees.forEach(e => {
                        (e.permissions || []).forEach(p => {
                            if (p.startsWith('ORDER_ENTRY:')) {
                                const fid = p.split(':')[1];
                                takenOrderEntry[fid] = e.name;
                            }
                        });
                    });

                    tbody.innerHTML = employees.map((emp, idx) => renderEmployeeRow(emp, idx, takenOrderEntry)).join('');
                    updateSerialNumbers();
                }

                function renderEmployeeRow(emp, idx, takenOrderEntry) {
                    const perms = emp.permissions || [];
                    const hasOrderEntry = perms.includes('ORDER_ENTRY'); // Legacy global check
                    const hasTaskManager = perms.includes('TASK_MANAGER'); // Legacy check
                    const pwd = escapeHtml(emp.password || '1234567');

                    // Filter out folders to show
                    const folders = allFmsFolders || [];

                    // Generate FMS Access Checkboxes (FMS:{id})
                    const fmsAccessHtml = folders.map(folder => {
                        const hasPerm = perms.includes(`FMS:${folder.id}`);
                        return `
                            <div class="perm-item">
                                <input type="checkbox" id="fms-access-${folder.id}-${emp.id}" 
                                       data-employee-id="${emp.id}" 
                                       data-perm="FMS:${folder.id}" 
                                       ${hasPerm ? 'checked' : ''} 
                                       onchange="onPermissionChange(this)">
                                <label for="fms-access-${folder.id}-${emp.id}">${escapeHtml(folder.name)}</label>
                            </div>
                        `;
                    }).join('');

                    // Generate Order Entry Checkboxes (ORDER_ENTRY:{id})
                    const orderEntryHtml = folders.map(folder => {
                        const hasPerm = perms.includes(`ORDER_ENTRY:${folder.id}`) || perms.includes('ORDER_ENTRY');
                        const assignedTo = takenOrderEntry[folder.id];
                        const isTakenByOther = assignedTo && assignedTo !== emp.name;

                        return `
                            <div class="perm-item" ${isTakenByOther ? 'style="opacity:0.6;"' : ''}>
                                <input type="checkbox" id="oe-access-${folder.id}-${emp.id}" 
                                       data-employee-id="${emp.id}" 
                                       data-perm="ORDER_ENTRY:${folder.id}" 
                                       ${hasPerm ? 'checked' : ''} 
                                       ${isTakenByOther ? 'disabled' : ''}
                                       onchange="onPermissionChange(this)">
                                <label for="oe-access-${folder.id}-${emp.id}">
                                    ${escapeHtml(folder.name)}
                                    ${isTakenByOther ? `<br><span style="font-size:10px;color:#ef4444;">(Assigned to ${escapeHtml(assignedTo)})</span>` : ''}
                                </label>
                            </div>
                        `;
                    }).join('');

                    return `
        <tr data-employee-id="${emp.id}">
            <td>${idx + 1}</td>
            <td>${escapeHtml(emp.name || '')}</td>
            <td>${escapeHtml(emp.email || '')}</td>
            <td>
                <div style="display:inline-flex; align-items:center; gap:8px;">
                    <span class="pwd-mask" style="color:#6c757d;">******</span>
                    <span class="pwd-real" style="display:none; color:#0f172a; font-weight:600;">${pwd}</span>
                    <button type="button" onclick="toggleRowPassword(this)" title="Show password"
                        style="border:none; background:transparent; color:#64748b; cursor:pointer; padding:2px; display:inline-flex; align-items:center;">
                        <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg class="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </button>
                </div>
            </td>
            <td>${escapeHtml(emp.department || '')}</td>
            <td>
                <select class="status-select" data-employee-id="${emp.id}" onchange="onStatusChange(this)">
                    <option value="Active" ${(emp.status || '') === 'Active' ? 'selected' : ''}>Active</option>
                    <option value="Hold" ${(emp.status || '') === 'Hold' ? 'selected' : ''}>Hold</option>
                    <option value="Deleted" ${(emp.status || '') === 'Deleted' ? 'selected' : ''}>Deleted</option>
                </select>
            </td>
            <td class="permission-cell">
                <div class="perm-wrap">
                    <button type="button" class="perm-trigger" onclick="togglePermDropdown(this, event)" aria-haspopup="true" aria-expanded="false">Permissions</button>
                    <div class="perm-dropdown" onclick="event.stopPropagation()">
                        ${fmsAccessHtml ? `
                            <div class="perm-accordion">
                                <button type="button" class="perm-accordion-btn" onclick="toggleAccordion(this)">
                                    <span>FMS Folders</span>
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="6 9 12 15 18 9"></polyline>
                                    </svg>
                                </button>
                                <div class="perm-accordion-content">
                                    ${fmsAccessHtml}
                                </div>
                            </div>
                            <div class="perm-divider" style="height:1px; background:#e2e8f0; margin:4px 0;"></div>
                        ` : ''}
                        
                        ${orderEntryHtml ? `
                            <div class="perm-accordion">
                                <button type="button" class="perm-accordion-btn" onclick="toggleAccordion(this)">
                                    <span>Order Entry</span>
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="6 9 12 15 18 9"></polyline>
                                    </svg>
                                </button>
                                <div class="perm-accordion-content">
                                    ${orderEntryHtml}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            </td>
            <td class="action-cell">
                <div class="row-action-wrap">
                    <button type="button" class="row-action-trigger" onclick="toggleActionDropdown(this, event)" aria-haspopup="true" aria-expanded="false">Actions</button>
                    <div class="row-action-dropdown" onclick="event.stopPropagation()">
                        <button type="button" class="row-action-item" onclick='closeActionMenus(); editEmployee(${JSON.stringify(emp).replace(/'/g, "&#39;")})'>Edit Employee</button>
                        <button type="button" class="row-action-item danger" onclick='closeActionMenus(); deleteEmployee("${emp.id}")'>Delete Employee</button>
                    </div>
                </div>
            </td>
        </tr>`;
                }



                function updateSerialNumbers() {
                    const rows = document.querySelectorAll('#employeeTableBody tr');
                    rows.forEach((row, index) => {
                        const snoCell = row.cells[0];
                        if (snoCell) {
                            snoCell.textContent = index + 1;
                        }
                    });
                }

                async function deleteEmployee(empId) {
                    if (!confirm("Are you sure you want to delete this employee? This action cannot be undone.")) {
                        return;
                    }

                    try {
                        const res = await fetch(`${API_BASE}/${empId}`, {
                            method: 'DELETE'
                        });

                        if (res.ok) {
                            // Find row and remove it from UI
                            const row = document.querySelector(`tr[data-employee-id="${empId}"]`);
                            const tbody = document.getElementById("employeeTableBody");
                            const currentRowCount = tbody.rows.length;
                            // const newRowHtml = renderEmployeeRowV2(data, currentRowCount);
                            // tbody.insertAdjacentHTML('beforeend', newRowHtml);
                            // updateSerialNumbers();
                            loadEmployees(); // Reload table
                            return;
                        } else {
                            const data = await res.json();
                            alert(data.error || "Failed to delete employee.");
                        }
                    } catch (e) {
                        console.error(e);
                        alert("Failed to delete employee.");
                    }
                }

                function escapeHtml(text) {
                    const div = document.createElement('div');
                    div.textContent = text;
                    return div.innerHTML;
                }

                function toggleRowPassword(btn) {
                    const cell = btn.closest('td');
                    if (!cell) return;
                    const mask = cell.querySelector('.pwd-mask');
                    const real = cell.querySelector('.pwd-real');
                    const eyeOpen = btn.querySelector('.eye-open');
                    const eyeClosed = btn.querySelector('.eye-closed');
                    const showing = real && real.style.display !== 'none';

                    if (mask) mask.style.display = showing ? '' : 'none';
                    if (real) real.style.display = showing ? 'none' : '';
                    if (eyeOpen) eyeOpen.style.display = showing ? '' : 'none';
                    if (eyeClosed) eyeClosed.style.display = showing ? 'none' : '';
                    btn.title = showing ? 'Show password' : 'Hide password';
                }

                function togglePermDropdown(triggerBtn, evt) {
                    if (evt) evt.stopPropagation();
                    const wrap = triggerBtn.closest('.perm-wrap');
                    const dropdown = wrap ? wrap.querySelector('.perm-dropdown') : null;
                    if (!dropdown) return;

                    document.querySelectorAll('.perm-dropdown').forEach(d => {
                        if (d !== dropdown) {
                            d.classList.remove('show');
                            d.classList.remove('open-upward');
                        }
                    });
                    document.querySelectorAll('.perm-trigger[aria-expanded="true"]').forEach(btn => {
                        if (btn !== triggerBtn) btn.setAttribute('aria-expanded', 'false');
                    });
                    document.querySelectorAll('.perm-fms-dropdown').forEach(d => d.classList.remove('show'));
                    closeActionMenus();

                    dropdown.classList.toggle('show');
                    if (dropdown.classList.contains('show')) {
                        const rect = triggerBtn.getBoundingClientRect();
                        const viewportPadding = 12;
                        const dropdownHeight = Math.min(dropdown.scrollHeight, Math.floor(window.innerHeight * 0.55), 340);
                        const spaceBelow = window.innerHeight - rect.bottom - viewportPadding;
                        const spaceAbove = rect.top - viewportPadding;
                        dropdown.classList.toggle('open-upward', spaceBelow < dropdownHeight && spaceAbove > spaceBelow);
                    }

                    triggerBtn.setAttribute('aria-expanded', dropdown.classList.contains('show') ? 'true' : 'false');
                }

                function closeActionMenus() {
                    document.querySelectorAll('.row-action-dropdown.show').forEach(el => {
                        el.classList.remove('show');
                        el.classList.remove('open-upward');
                    });
                    document.querySelectorAll('.row-action-trigger').forEach(btn => btn.setAttribute('aria-expanded', 'false'));
                }

                function toggleActionDropdown(triggerBtn, evt) {
                    if (evt) evt.stopPropagation();
                    const wrap = triggerBtn.closest('.row-action-wrap');
                    const dropdown = wrap ? wrap.querySelector('.row-action-dropdown') : null;
                    if (!dropdown) return;

                    document.querySelectorAll('.row-action-dropdown').forEach(d => {
                        if (d !== dropdown) {
                            d.classList.remove('show');
                            d.classList.remove('open-upward');
                        }
                    });
                    document.querySelectorAll('.row-action-trigger[aria-expanded="true"]').forEach(btn => {
                        if (btn !== triggerBtn) btn.setAttribute('aria-expanded', 'false');
                    });
                    document.querySelectorAll('.perm-dropdown.show').forEach(d => {
                        d.classList.remove('show');
                        d.classList.remove('open-upward');
                    });
                    document.querySelectorAll('.perm-trigger[aria-expanded="true"]').forEach(btn => {
                        btn.setAttribute('aria-expanded', 'false');
                    });
                    document.querySelectorAll('.perm-fms-dropdown.show').forEach(d => d.classList.remove('show'));

                    dropdown.classList.toggle('show');
                    if (dropdown.classList.contains('show')) {
                        const rect = triggerBtn.getBoundingClientRect();
                        const viewportPadding = 12;
                        const dropdownHeight = Math.min(dropdown.scrollHeight, Math.floor(window.innerHeight * 0.45), 220);
                        const spaceBelow = window.innerHeight - rect.bottom - viewportPadding;
                        const spaceAbove = rect.top - viewportPadding;
                        dropdown.classList.toggle('open-upward', spaceBelow < dropdownHeight && spaceAbove > spaceBelow);
                    }

                    triggerBtn.setAttribute('aria-expanded', dropdown.classList.contains('show') ? 'true' : 'false');
                }

                function toggleFmsDropdown(triggerBtn, evt) {
                    if (evt) evt.stopPropagation();
                    const row = triggerBtn.closest('.perm-fms-row');
                    const subMenu = row ? row.querySelector('.perm-fms-dropdown') : null;
                    document.querySelectorAll('.perm-fms-dropdown').forEach(d => { if (d !== subMenu) d.classList.remove('show'); });
                    if (subMenu) subMenu.classList.toggle('show');
                    triggerBtn.setAttribute('aria-expanded', subMenu && subMenu.classList.contains('show') ? 'true' : 'false');
                }

                function getPermissionPayload(employeeId) {
                    const row = document.querySelector(`tr[data-employee-id="${employeeId}"]`);
                    if (!row) return null;

                    const permissions = [];
                    const checkboxes = row.querySelectorAll('input[type="checkbox"][data-perm]');
                    checkboxes.forEach(cb => {
                        if (cb.checked) {
                            permissions.push(cb.getAttribute('data-perm'));
                        }
                    });

                    return permissions;
                }

                async function onPermissionChange(checkbox) {
                    const employeeId = checkbox.getAttribute('data-employee-id');
                    const permissions = getPermissionPayload(employeeId);
                    if (!employeeId || !permissions) return;

                    console.log('Saving permissions for employee', employeeId, ':', permissions);

                    try {
                        const res = await fetch(`${API_BASE}/${employeeId}/permissions`, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(permissions)
                        });
                        if (!res.ok) {
                            const errorText = await res.text();
                            throw new Error(`Status: ${res.status} ${res.statusText}. Details: ${errorText}`);
                        }

                        // Update local state
                        if (employees) {
                            const emp = employees.find(e => e.id === employeeId);
                            if (emp) {
                                emp.permissions = permissions;
                                // Re-render table removed to keep dropdown open
                                // renderTable(employees); 
                            }
                        }

                        console.log('✅ Permissions saved successfully');
                    } catch (e) {
                        console.error(e);
                        checkbox.checked = !checkbox.checked; // Revert checkbox if save fails
                        alert('Failed to save permission:\n' + e.message);
                    }
                }

                async function onStatusChange(selectEl) {
                    if (selectEl.value === 'Deleted') {
                        const ok = confirm('Are you sure you want to set this employee as Deleted?');
                        if (!ok) {
                            selectEl.value = 'Active';
                            return;
                        }
                    }
                    const employeeId = selectEl.getAttribute('data-employee-id');
                    const row = document.querySelector(`tr[data-employee-id="${employeeId}"]`);
                    const name = row?.cells[1]?.textContent?.trim() || '';
                    const department = row?.cells[2]?.textContent?.trim() || '';
                    try {
                        const res = await fetch(`${API_BASE}/${employeeId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                name,
                                department,
                                status: selectEl.value,
                                permissions: getPermissionPayload(employeeId) || {}
                            })
                        });
                        if (!res.ok) throw new Error('Failed to update status');
                    } catch (e) {
                        console.error(e);
                        alert('Failed to update status. Please try again.');
                    }
                }

                function editEmployee(id) {
                    alert("Edit functionality is currently disabled as we transition to the new email/password structure. Please delete and re-create the employee if needed for now.");
                }

                async function saveEmployee() {
                    const name = document.getElementById("empName").value;
                    const email = document.getElementById("empEmail").value;
                    const dept = document.getElementById("empDept").value;
                    const password = document.getElementById("empPassword").value;
                    const status = "Active"; // Default status

                    if (!name || !dept || !email || !password) {
                        alert("Name, Email, Department, and Password are required");
                        return;
                    }

                    // Collect permissions from checkboxes
                    const permissions = [];
                    if (document.getElementById('permOrderEntry').checked) {
                        permissions.push('ORDER_ENTRY');
                    }

                    // Collect FMS folder permissions
                    document.querySelectorAll('.fms-folder-checkbox:checked').forEach(cb => {
                        const folderId = cb.getAttribute('data-folder-id');
                        if (folderId) {
                            permissions.push(`FMS:${folderId}`);
                        }
                    });

                    console.log('Creating employee with permissions:', permissions);
                    hideMessage("employeeErrorMessage");
                    try {
                        var res = await fetch(API_BASE, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                name: name,
                                email: email,
                                department: dept,
                                status: status,
                                permissions: permissions,
                                password: password
                            })
                        });
                        var data = {};
                        try { data = await res.json(); } catch (e) { }
                        if (res.ok) {
                            closeModal();
                            showSuccessMessage();
                            loadEmployees(); // Reload table
                            return;
                        }
                        showErrorMessage(data.error || "Failed to add employee. Please try again.");
                    } catch (e) {
                        console.error(e);
                        showErrorMessage("Failed to add employee. Please try again.");
                    }
                }

                document.addEventListener('DOMContentLoaded', function () {
                    loadEmployees();
                    // Close dropdowns when clicking outside
                    document.addEventListener('click', function (e) {
                        if (!e.target.closest('.perm-trigger') && !e.target.closest('.perm-dropdown')) {
                            document.querySelectorAll('.perm-dropdown.show').forEach(el => {
                                el.classList.remove('show');
                                el.classList.remove('open-upward');
                            });
                            document.querySelectorAll('.perm-trigger').forEach(btn => btn.setAttribute('aria-expanded', 'false'));
                            document.querySelectorAll('.perm-fms-dropdown.show').forEach(el => el.classList.remove('show'));
                        }
                        if (!e.target.closest('.row-action-trigger') && !e.target.closest('.row-action-dropdown')) {
                            closeActionMenus();
                        }
                    });
                });
            </script>

        </main>
    </div>
</body>

</html>
